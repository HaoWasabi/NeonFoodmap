# =============================================================================
# CI/CD Pipeline cho NeonFoodmap (Full-stack)
# CI-001: GitHub Actions CI/CD Pipeline
# Depends: AWS-004, IAM-001
#
# Trigger: push/PR vào main + develop/feature branches (chỉ test)
# Steps: Lint → Test → E2E → Build Docker → Push ECR → Deploy ECS → Smoke Test
# =============================================================================

name: NeonFoodmap CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY || '497172038341.dkr.ecr.ap-southeast-1.amazonaws.com' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'neonfoodmap-cluster' }}
  ECS_BACKEND_SERVICE: ${{ vars.ECS_BACKEND_SERVICE || 'neonfoodmap-backend-svc' }}
  ECS_BACKEND_TASK_DEF: ${{ vars.ECS_BACKEND_TASK_DEF || 'neonfoodmap-backend-td' }}
  APP_URL: ${{ vars.APP_URL || 'https://neonfoodmap.example.com' }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Backend Lint & Unit Tests
  # ─────────────────────────────────────────────
  backend-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config gcc

      - name: Install python dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        working-directory: ./backend
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run Django Unit Tests
        working-directory: ./backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings_test
          SECRET_KEY: ci-test-secret-key-not-for-production
        run: |
          python manage.py test --settings=config.settings_test --verbosity=2

  # ─────────────────────────────────────────────
  # Job 2: Frontend Lint & Build
  # Chạy song song với backend-test
  # ─────────────────────────────────────────────
  frontend-check:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Build static bundle
        working-directory: ./frontend
        run: npm run build

  # ─────────────────────────────────────────────
  # Job 3: Frontend E2E Tests (Playwright)
  # Chạy critical tests; webServer tự start bằng `npm run preview`
  # ─────────────────────────────────────────────
  e2e-tests:
    name: Frontend E2E Tests (Playwright)
    needs: [frontend-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend (needed for preview server)
        working-directory: ./frontend
        run: npm run build

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests (critical)
        working-directory: ./frontend
        env:
          CI: 'true'
        run: npx playwright test --project=critical

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 4: Build & Push Docker Images to ECR
  # Chỉ chạy khi push vào main + tests pass
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    needs: [backend-test, e2e-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      backend-image: ${{ steps.set-output.outputs.image }}
      image-tag: ${{ steps.vars.outputs.sha_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get short git SHA
        id: vars
        run: |
          echo "sha_tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/neonfoodmap-backend:latest
            ${{ env.ECR_REGISTRY }}/neonfoodmap-backend:${{ steps.vars.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/neonfoodmap-frontend:latest
            ${{ env.ECR_REGISTRY }}/neonfoodmap-frontend:${{ steps.vars.outputs.sha_tag }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set backend image output
        id: set-output
        run: |
          echo "image=${{ env.ECR_REGISTRY }}/neonfoodmap-backend:${{ steps.vars.outputs.sha_tag }}" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # Job 5: Deploy Backend to ECS
  # Requires manual approval via GitHub Environment "production"
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to ECS
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ env.APP_URL }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_BACKEND_TASK_DEF }} \
            --query 'taskDefinition' \
            --output json > task-def.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: backend
          image: ${{ needs.build-and-push.outputs.backend-image }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_BACKEND_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Run database migrations
        run: |
          aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition ${{ env.ECS_BACKEND_TASK_DEF }} \
            --overrides '{
              "containerOverrides": [{
                "name": "backend",
                "command": ["python", "manage.py", "migrate", "--noinput"]
              }]
            }' \
            --launch-type FARGATE \
            --network-configuration '{
              "awsvpcConfiguration": {
                "subnets": ${{ secrets.ECS_SUBNETS }},
                "securityGroups": ${{ secrets.ECS_SECURITY_GROUPS }},
                "assignPublicIp": "ENABLED"
              }
            }'

  # ─────────────────────────────────────────────
  # Job 6: Post-Deploy Smoke Tests
  # ─────────────────────────────────────────────
  smoke-tests:
    name: Post-Deploy Smoke Tests
    needs: deploy-backend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Wait for service to stabilize
        run: sleep 15

      - name: Health check - API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 ${{ env.APP_URL }}/api/)
          echo "API responded: $STATUS"
          if [ "$STATUS" -ge 500 ]; then
            echo "❌ API health check failed!"
            exit 1
          fi
          echo "✅ API is healthy"

      - name: Health check - Critical endpoints
        run: |
          ENDPOINTS=("/api/pois/" "/api/tours/" "/api/categories/")
          FAILED=0
          for ep in "${ENDPOINTS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${{ env.APP_URL }}${ep}")
            echo "  ${ep} → ${STATUS}"
            if [ "$STATUS" -ge 500 ]; then FAILED=1; fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "❌ Some endpoints failing!"
            exit 1
          fi
          echo "✅ All endpoints OK"
