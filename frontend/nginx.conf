server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Bật gzip để giảm kích thước response
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/x-font-ttf font/opentype;
    gzip_min_length 1024;

    # Cache dài hạn cho assets có hash trong tên file (vite tự generate)
    # Ví dụ: /assets/index-Dh3kQ2.js
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Không cache index.html — browser phải fetch lại để lấy bundle mới nhất
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # React Router: mọi route không khớp file tĩnh đều trả về index.html
    # (tránh lỗi 404 khi F5 trên các route như /map, /profile, ...)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
